$idlehandler = $HOME/.config/hypr/scripts/idle_handler

general {
	lock_cmd = hyprlock
}

listener {
	timeout = 90
	on-timeout = $idlehandler brightness-down
	on-resume = $idlehandler brightness-restore
}

listener {
	timeout = 300
	on-timeout = $idlehandler screen_lock
}

listener {
	timeout = 900
	on-timeout = $idlehandler suspend
}
